repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: local
    hooks:
      - id: codeweave-unit-tests
        name: codeweave-unit-tests
        entry: python -m unittest tests.test_app_routes tests.test_app_integration -v
        language: system
        pass_filenames: false
