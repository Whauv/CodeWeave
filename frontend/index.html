<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeMapper</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --panel: #171717;
      --panel-2: #1f1f1f;
      --border: #2e2e2e;
      --text: #f5f5f5;
      --muted: #9d9d9d;
      --accent: #ffcc00;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #1b1b1b 0%, #0d0d0d 55%);
      color: var(--text);
      font-family: "Segoe UI", sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .top-bar {
      height: 50px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(13, 13, 13, 0.92);
      backdrop-filter: blur(8px);
    }

    .top-bar input,
    .top-bar button {
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 0 12px;
    }

    #path-input {
      flex: 1.5;
      min-width: 240px;
    }

    #search-input {
      flex: 1;
      min-width: 200px;
    }

    #scan-btn,
    .control-btn,
    .modal-close {
      cursor: pointer;
      background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
      transition: transform 0.18s ease, border-color 0.18s ease;
    }

    #scan-btn:hover,
    .control-btn:hover,
    .modal-close:hover {
      transform: translateY(-1px);
      border-color: #4a4a4a;
    }

    #status-label {
      min-width: 180px;
      color: var(--muted);
      font-size: 0.92rem;
      text-align: right;
    }

    .main-area {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    #graph-container {
      position: relative;
      width: 70%;
      min-width: 0;
      border-right: 1px solid var(--border);
    }

    #graph-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    #graph-controls {
      position: absolute;
      right: 16px;
      top: 16px;
      z-index: 5;
      display: flex;
      gap: 8px;
    }

    .control-btn {
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    #detail-panel {
      width: 30%;
      min-width: 320px;
      max-width: 480px;
      background: linear-gradient(180deg, rgba(30, 30, 30, 0.98), rgba(18, 18, 18, 0.98));
      padding: 18px;
      overflow-y: auto;
    }

    #detail-panel.hidden {
      display: none;
    }

    .panel-card,
    .summary-box,
    .blast-box,
    .list-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
    }

    #node-name {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    #node-file,
    #churn-info {
      font-family: Consolas, monospace;
      color: var(--muted);
      font-size: 0.9rem;
    }

    #node-summary {
      line-height: 1.5;
      color: #f0e6c0;
    }

    .mutation-badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .list-title {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .linked-item {
      display: block;
      color: var(--text);
      text-decoration: none;
      padding: 8px 10px;
      margin-bottom: 8px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid transparent;
      cursor: pointer;
    }

    .linked-item:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .epicenter {
      animation: epicenterPulse 1.4s ease-in-out infinite;
    }

    @keyframes epicenterPulse {
      0% { filter: drop-shadow(0 0 2px rgba(255, 70, 70, 0.4)); }
      50% { filter: drop-shadow(0 0 12px rgba(255, 70, 70, 1)); }
      100% { filter: drop-shadow(0 0 2px rgba(255, 70, 70, 0.4)); }
    }

    #monaco-modal {
      position: fixed;
      inset: 0;
      display: none;
      background: rgba(0, 0, 0, 0.88);
      z-index: 20;
    }

    #monaco-modal.visible {
      display: block;
    }

    #monaco-editor {
      position: absolute;
      inset: 32px;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .modal-close {
      position: absolute;
      right: 46px;
      top: 38px;
      z-index: 25;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1.3rem;
    }

    .depth-group summary {
      cursor: pointer;
      color: var(--accent);
      margin-bottom: 8px;
    }

    @media (max-width: 980px) {
      .main-area {
        flex-direction: column;
      }

      #graph-container,
      #detail-panel {
        width: 100%;
        max-width: none;
      }

      #graph-container {
        height: 58vh;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="top-bar">
      <input id="path-input" type="text" placeholder="Enter absolute project path..." />
      <button id="scan-btn">⚡ Scan Project</button>
      <input id="search-input" type="text" placeholder="🔍 Search nodes..." />
      <div id="status-label">Ready</div>
    </div>

    <div class="main-area">
      <div id="graph-container">
        <div id="graph-controls">
          <button id="clear-blast-btn" class="control-btn">Clear</button>
        </div>
        <svg id="graph-svg"></svg>
      </div>

      <aside id="detail-panel" class="hidden">
        <div class="panel-card">
          <div id="node-name">Select a node</div>
          <div id="node-file"></div>
        </div>
        <div class="summary-box">
          <div class="list-title">Summary</div>
          <div id="node-summary">Node details will appear here.</div>
        </div>
        <div class="panel-card">
          <div id="mutation-badge"></div>
          <div id="churn-info"></div>
        </div>
        <div class="list-card">
          <div class="list-title">Callers</div>
          <div id="callers-list"></div>
        </div>
        <div class="list-card">
          <div class="list-title">Callees</div>
          <div id="callees-list"></div>
        </div>
        <div class="blast-box">
          <div class="list-title">Blast Radius</div>
          <div id="blast-info">Right-click a node to simulate impact.</div>
        </div>
      </aside>
    </div>
  </div>

  <div id="monaco-modal">
    <button class="modal-close" id="modal-close-btn">×</button>
    <div id="monaco-editor"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>
  <script src="/panel.js"></script>
  <script src="/graph.js"></script>
</body>
</html>
